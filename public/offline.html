<!DOCTYPE html>
<html lang="es-CR">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0a0a" />
    <title>Sin conexión · Xtreme Gym</title>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      html,
      body {
        height: 100%;
      }

      body {
        background: #0a0a0a;
        color: #f5f5f5;
        font-family: ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
        display: flex;
        align-items: center;
        justify-content: center;
        padding: 24px;
        background-image: radial-gradient(circle at 20% 15%, rgba(216, 255, 62, 0.08), transparent 45%),
          radial-gradient(circle at 85% 80%, rgba(216, 255, 62, 0.05), transparent 40%);
      }

      .panel {
        width: 100%;
        max-width: 420px;
        border: 3px solid #d8ff3e;
        background: #111;
        box-shadow: 8px 8px 0 rgba(216, 255, 62, 0.25);
        padding: 32px 28px;
        text-align: center;
      }

      .icon {
        font-size: 56px;
        line-height: 1;
        margin-bottom: 18px;
      }

      .tag {
        display: inline-block;
        border: 2px solid #d8ff3e;
        color: #d8ff3e;
        font-size: 11px;
        font-weight: 800;
        letter-spacing: 0.2em;
        text-transform: uppercase;
        padding: 4px 10px;
        margin-bottom: 16px;
      }

      h1 {
        font-size: 26px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.04em;
        margin-bottom: 12px;
        color: #d8ff3e;
      }

      p {
        font-size: 15px;
        line-height: 1.6;
        color: #c7c7c7;
        margin-bottom: 24px;
      }

      button {
        width: 100%;
        border: 3px solid #d8ff3e;
        background: #d8ff3e;
        color: #0a0a0a;
        font-size: 15px;
        font-weight: 900;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        padding: 14px 18px;
        cursor: pointer;
        box-shadow: 5px 5px 0 rgba(216, 255, 62, 0.35);
        transition: transform 0.08s ease, box-shadow 0.08s ease;
      }

      button:active {
        transform: translate(3px, 3px);
        box-shadow: 1px 1px 0 rgba(216, 255, 62, 0.35);
      }

      .status {
        margin-top: 18px;
        font-size: 12px;
        font-weight: 700;
        letter-spacing: 0.12em;
        text-transform: uppercase;
        color: #8a8a8a;
      }

      .status .dot {
        display: inline-block;
        width: 8px;
        height: 8px;
        border-radius: 999px;
        background: #ff5c5c;
        margin-right: 8px;
        vertical-align: middle;
        animation: pulse 1.4s ease-in-out infinite;
      }

      @keyframes pulse {
        0%,
        100% {
          opacity: 1;
        }
        50% {
          opacity: 0.3;
        }
      }
    </style>
  </head>
  <body>
    <main class="panel">
      <div class="icon">📡</div>
      <div class="tag">Modo offline</div>
      <h1>Sin conexión</h1>
      <p>
        ¡Upe! Parece que andás sin internet o el servidor no responde. Tranquilo, apenas vuelva la señal te
        reconectamos de una. Pura vida.
      </p>
      <button type="button" onclick="location.reload()">Reintentar</button>
      <div class="status"><span class="dot"></span><span id="status-text">Buscando conexión…</span></div>
    </main>
    <script>
      (() => {
        const statusText = document.getElementById("status-text");
        let checking = false;

        const tryReconnect = async () => {
          if (checking) return;
          checking = true;
          try {
            const response = await fetch("/", { method: "HEAD", cache: "no-store" });
            if (response.ok) {
              statusText.textContent = "¡Volvió la señal! Recargando…";
              location.reload();
              return;
            }
          } catch {
            // sigue sin conexión
          }
          checking = false;
        };

        window.addEventListener("online", tryReconnect);
        setInterval(tryReconnect, 4000);
      })();
    </script>
  </body>
</html>
